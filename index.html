<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzun Çəkən Sözardı - Çingiz Abdullayev</title>
    <link rel="icon" href="data:,">
    <style>
        body { 
            margin: 0; 
            background: #1a0000; 
            overflow: hidden; 
            font-family: Arial, sans-serif; 
        }
       .bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('moscow-bg.jpg') center/cover no-repeat;
            filter: blur(15px) brightness(0.2);
            z-index: -1;
        }
        #flipbook {
            width: 90vw; height: 90vh;
            margin: 5vh auto;
            box-shadow: 0 0 80px rgba(255,0,0,0.6);
        }
        #flipbook .page {
            background-image: url('moscow-bg.jpg');
            background-size: cover;
            background-position: center;
            background-color: #4a0000;
            background-blend-mode: multiply;
            border: 1px solid #600;
        }
        #flipbook .page canvas {
            width: 100% !important;
            height: 100% !important;
            background: rgba(248,248,248,0.92);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
       .toolbar {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(20,0,0,0.95);
            backdrop-filter: blur(15px);
            padding: 12px 25px; border-radius: 14px;
            border: 2px solid #ff0000;
            display: flex; gap: 15px; align-items: center;
            z-index: 999999;
        }
       .toolbar button {
            background: linear-gradient(135deg, #c00, #300);
            color: #fff; border: 1px solid #f33;
            padding: 12px 20px; border-radius: 8px; 
            cursor: pointer; font-weight: 700; font-size: 16px;
            transition: 0.2s;
        }
       .toolbar button:hover { 
            background: #e00; 
            box-shadow: 0 0 15px #f00;
            transform: scale(1.08);
        }
        #pageInfo { 
            color: #fff; font-weight: 700; 
            min-width: 90px; text-align: center; font-size: 17px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div id="flipbook"></div>
    <div class="toolbar">
        <button onclick="prevPage()">‹ Əvvəlki</button>
        <span id="pageInfo">Yüklənir...</span>
        <button onclick="nextPage()">Sonrakı ›</button>
        <button onclick="toggleRain()" id="rainBtn">🔇 Səssiz</button>
    </div>

    <audio id="rainSound" loop>
        <source src="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg" type="audio/ogg">
    </audio>
    <audio id="flipSound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/foley/page_turn.ogg" type="audio/ogg">
    </audio>

    <!-- 1. ƏVVƏLCƏ jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- 2. SONRA turn.js - işləyən versiya -->
    <script src="https://raw.githack.com/blasten/turn.js/master/turn.min.js"></script>
    <!-- 3. SONRA pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const rainSound = document.getElementById('rainSound');
        const flipSound = document.getElementById('flipSound');
        rainSound.volume = 0.4;

        document.addEventListener('click', () => {
            rainSound.play().then(() => {
                document.getElementById('rainBtn').innerText = '🌧️ Yağmur';
            }).catch(()=>{});
        }, {once: true});

        // jQuery və turn.js yüklənibmi yoxla
        $(document).ready(function() {
            if (typeof $.fn.turn === 'undefined') {
                alert('XƏTA: turn.js yüklənmədi! İnterneti yoxla və ya AdBlock-u söndür.');
                return;
            }

            const pdfUrl = './kitab.pdf?v=' + new Date().getTime();

            pdfjsLib.getDocument({ url: pdfUrl }).promise.then(pdf => {
                const flipbook = $('#flipbook');
                
                for(let i = 1; i <= pdf.numPages; i++) {
                    flipbook.append(`<div class="page" id="page-${i}"></div>`);
                }

                flipbook.turn({
                    width: flipbook.width(),
                    height: flipbook.height(),
                    autoCenter: true,
                    gradients: true,
                    elevation: 50,
                    when: {
                        turning: function(e, page) {
                            flipSound.currentTime = 0;
                            flipSound.volume = 0.7;
                            flipSound.play().catch(()=>{});
                            $('#pageInfo').text(page + ' / ' + pdf.numPages);
                        }
                    }
                });

                for(let i = 1; i <= pdf.numPages; i++) {
                    renderPage(pdf, i);
                }
                
                $('#pageInfo').text('1 / ' + pdf.numPages);

            }).catch(err => {
                console.error('PDF yüklənmədi:', err);
                $('#pageInfo').text('XƏTA');
                alert('XƏTA: ' + err.message);
            });
        });

        function renderPage(pdf, num) {
            pdf.getPage(num).then(page => {
                const scale = 1.5;
                const viewport = page.getViewport({scale: scale});
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                    const pageDiv = document.getElementById('page-' + num);
                    if(pageDiv) pageDiv.appendChild(canvas);
                });
            });
        }

        function nextPage() { $('#flipbook').turn('next'); }
        function prevPage() { $('#flipbook').turn('previous'); }
        
        function toggleRain() {
            const btn = document.getElementById('rainBtn');
            if(rainSound.paused) {
                rainSound.play().catch(()=>{});
                btn.innerText = '🌧️ Yağmur';
            } else {
                rainSound.pause();
                btn.innerText = '🔇 Səssiz';
            }
        }

        $(document).keydown(e => {
            if(e.keyCode == 37) prevPage();
            if(e.keyCode == 39) nextPage();
        });
    </script>
</body>
</html>
