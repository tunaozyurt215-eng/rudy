<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzun Çəkən Sözardı - Çingiz Abdullayev</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            font-family: Arial, sans-serif; 
        }
       .bg {
            position: fixed; 
            top: 0; 
            left: 0;
            width: 100%; 
            height: 100%;
            background: url('moscow-bg.jpg') center/cover no-repeat;
            filter: blur(12px) brightness(0.25);
            z-index: -1;
        }
        #flipbook {
            width: 90vw; 
            height: 90vh;
            margin: 5vh auto;
            box-shadow: 0 0 60px rgba(255,0,0,0.5);
        }
        #flipbook.page {
            background: #f8f8f8;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #flipbook.page canvas {
            max-width: 100%;
            max-height: 100%;
        }
       .toolbar {
            position: fixed; 
            bottom: 20px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(12px);
            padding: 12px 25px; 
            border-radius: 14px;
            border: 1px solid rgba(255,0,0,0.4);
            display: flex; 
            gap: 15px; 
            align-items: center;
            z-index: 100;
        }
       .toolbar button {
            background: linear-gradient(135deg, #8e0e0e, #2a0000);
            color: #fff; 
            border: 1px solid #550000;
            padding: 10px 18px; 
            border-radius: 8px; 
            cursor: pointer;
            font-weight: 600; 
            font-size: 16px;
            transition: 0.2s;
        }
       .toolbar button:hover { 
            background: #550000; 
            border-color: #ff3333; 
        }
        #pageInfo { 
            color: #fff; 
            font-weight: 600; 
            min-width: 80px; 
            text-align: center; 
        }
    </style>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/0.11/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div class="bg"></div>
    <div id="flipbook"></div>
    <div class="toolbar">
        <button onclick="prevPage()">‹ Əvvəlki</button>
        <span id="pageInfo">1 /?</span>
        <button onclick="nextPage()">Sonrakı ›</button>
        <button onclick="toggleRain()" id="rainBtn">🌧️ Yağmur</button>
    </div>

    <audio id="rainSound" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1718f1796.mp3" type="audio/mpeg">
    </audio>
    <audio id="flipSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2404/2404-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const rainSound = document.getElementById('rainSound');
        const flipSound = document.getElementById('flipSound');
        rainSound.volume = 0.3;

        document.body.addEventListener('click', () => {
            if(rainSound.paused) rainSound.play();
        }, {once: true});

        $(document).ready(function() {
            let pdfDoc = null;

            pdfjsLib.getDocument('kitab.pdf').promise.then(pdf => {
                pdfDoc = pdf;
                const flipbook = $('#flipbook');
                
                flipbook.turn({
                    width: flipbook.width(),
                    height: flipbook.height(),
                    autoCenter: true,
                    acceleration: true,
                    gradients: true,
                    when: {
                        turning: function(e, page) {
                            flipSound.currentTime = 0;
                            flipSound.volume = 0.6;
                            flipSound.play().catch(()=>{});
                            $('#pageInfo').text(page + ' / ' + pdf.numPages);
                        }
                    }
                });

                for(let i = 1; i <= pdf.numPages; i++) {
                    flipbook.turn('addPage', $('<div class="page" id="page-'+i+'">Yüklənir...</div>')[0], i);
                    renderPage(pdf, i);
                }
                $('#pageInfo').text('1 / ' + pdf.numPages);

            }).catch(err => {
                console.error('PDF yüklənmədi:', err);
                alert('XƏTA: kitab.pdf tapılmadı! Fayl adını və repoda olduğunu yoxla.');
            });
        });

        function renderPage(pdf, num) {
            pdf.getPage(num).then(page => {
                const scale = 1.5;
                const viewport = page.getViewport({scale: scale});
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                page.render({
                    canvasContext: ctx, 
                    viewport: viewport
                }).promise.then(() => {
                    const pageDiv = document.getElementById('page-' + num);
                    if(pageDiv) {
                        pageDiv.innerHTML = '';
                        pageDiv.appendChild(canvas);
                    }
                });
            });
        }

        function nextPage() { $('#flipbook').turn('next'); }
        function prevPage() { $('#flipbook').turn('previous'); }
        
        function toggleRain() {
            const btn = document.getElementById('rainBtn');
            if(rainSound.paused) {
                rainSound.play();
                btn.innerText = '🌧️ Yağmur';
            } else {
                rainSound.pause();
                btn.innerText = '🔇 Səssiz';
            }
        }

        $(document).keydown(e => {
            if(e.keyCode == 37) prevPage(); // Sol ox
            if(e.keyCode == 39) nextPage(); // Sağ ox
        });
    </script>
</body>
</html>
