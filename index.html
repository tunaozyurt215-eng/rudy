<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzun Çəkən Sözardı - Çingiz Abdullayev</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/css/page-flip.min.css">
    <style>
        body { 
            margin: 0; 
            background: #1a0000; 
            overflow: hidden;
            /* TELEFON ÜÇÜN DÜZƏLİŞ - BUNU ƏLAVƏ ET */
@media only screen and (max-width: 768px) {
  body {
    background-image: none !important;
  }  body {
    background-image: none !important;
    overflow: auto !important; /* BUNU ƏLAVƏ ET */
  }
  .book-container, .page, .content {
    column-count: 1 !important;
    font-size: 18px !important; 
    line-height: 1.8 !important; 
    color: #f5f5f5 !important;
    padding: 15px !important;
    margin: 0 !important;
   .bg {
    display: none !important; /* BUNU ƏLAVƏ ET */
   } }
  .logo, .vivo {
    display: none !important;
  }
}
            font-family: Arial, sans-serif; 
        }
       .bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('moscow-bg.jpg') center/cover no-repeat;
            filter: blur(15px) brightness(0.2);
            z-index: -1;
        }
        #flipbook {
            width: 90vw; height: 90vh;
            margin: 5vh auto;
        }
        .stf__parent {
            box-shadow: 0 0 80px rgba(255,0,0,0.6);
        }
        .page {
            background-image: url('moscow-bg.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .page::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(80,0,0,0.75);
            z-index: 1;
        }
        .page canvas {
            width: 100% !important;
            height: 100% !important;
            position: relative;
            z-index: 2;
            filter: invert(1) hue-rotate(180deg) contrast(1.2);
            mix-blend-mode: screen;
        }
       .toolbar {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(20,0,0,0.95);
            backdrop-filter: blur(15px);
            padding: 12px 25px; border-radius: 14px;
            border: 2px solid #ff0000;
            display: flex; gap: 15px; align-items: center;
            z-index: 999999;
        }
       .toolbar button {
            background: linear-gradient(135deg, #c00, #300);
            color: #fff; border: 1px solid #f33;
            padding: 12px 20px; border-radius: 8px; 
            cursor: pointer; font-weight: 700; font-size: 16px;
        }
       .toolbar button:hover { 
            background: #e00; 
            box-shadow: 0 0 15px #f00;
        }
        #pageInfo { 
            color: #fff; font-weight: 700; 
            min-width: 90px; text-align: center; font-size: 17px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div id="flipbook"></div>
    <div class="toolbar">
        <button id="prevBtn">‹ Əvvəlki</button>
        <span id="pageInfo">Yüklənir...</span>
        <button id="nextBtn">Sonrakı ›</button>
        <button id="rainBtn">🔇 Səssiz</button>
    </div>

    <audio id="rainSound" loop>
        <source src="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg" type="audio/ogg">
    </audio>
    <audio id="flipSound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/foley/page_turn.ogg" type="audio/ogg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        const rainSound = document.getElementById('rainSound');
        const flipSound = document.getElementById('flipSound');
        rainSound.volume = 0.4;

        document.addEventListener('click', () => {
            rainSound.play().then(() => {
                document.getElementById('rainBtn').innerText = '🌧️ Yağmur';
            }).catch(()=>{});
        }, {once: true});

        document.addEventListener('DOMContentLoaded', async () => {
            const pdfUrl = './kitab.pdf?v=' + new Date().getTime();
            
            try {
                const pdf = await pdfjsLib.getDocument({ url: pdfUrl }).promise;
                const pageCount = pdf.numPages;
                
                const pageFlip = new St.PageFlip(document.getElementById('flipbook'), {
                    width: window.innerWidth * 0.45,
                    height: window.innerHeight * 0.9,
                    size: "stretch",
                    maxShadowOpacity: 0.5,
                    showCover: true,
                    mobileScrollSupport: false
                });

                const pages = [];
                for (let i = 1; i <= pageCount; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    
                    const pageDiv = document.createElement('div');
                    pageDiv.classList.add('page');
                    pageDiv.appendChild(canvas);
                    pages.push(pageDiv);
                }

                pageFlip.loadFromHTML(pages);
                
                document.getElementById('prevBtn').addEventListener('click', () => pageFlip.flipPrev());
                document.getElementById('nextBtn').addEventListener('click', () => pageFlip.flipNext());
                
                const pageInfo = document.getElementById('pageInfo');
                pageInfo.textContent = `1 / ${pageCount}`;
                
                pageFlip.on('flip', (e) => {
                    flipSound.currentTime = 0;
                    flipSound.volume = 0.7;
                    flipSound.play().catch(()=>{});
                    pageInfo.textContent = `${e.data + 1} / ${pageCount}`;
                });

                document.getElementById('rainBtn').addEventListener('click', () => {
                    const btn = document.getElementById('rainBtn');
                    if(rainSound.paused) {
                        rainSound.play().catch(()=>{});
                        btn.innerText = '🌧️ Yağmur';
                    } else {
                        rainSound.pause();
                        btn.innerText = '🔇 Səssiz';
                    }
                });

                document.addEventListener('keydown', (e) => {
                    if(e.keyCode == 37) pageFlip.flipPrev();
                    if(e.keyCode == 39) pageFlip.flipNext();
                });

            } catch (err) {
                console.error('PDF yüklənmədi:', err);
                document.getElementById('pageInfo').textContent = 'XƏTA';
                alert('XƏTA: kitab.pdf tapılmadı və ya zədəlidir. ' + err.message);
            }
        });
    </script>
</body>
</html>
